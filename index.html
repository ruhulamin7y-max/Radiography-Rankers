<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiography Aspirants</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

    <!-- Top Header -->
    <header class="main-header">
        <div class="user-info"><i class="fa-solid fa-circle-user"></i> <span id="display-name">Guest</span></div>
        <div class="icons"><i class="fa-regular fa-bell"></i></div>
    </header>

    <!-- App Views -->
    <div id="home-view" class="view">
        <div class="banner-slider"><img src="https://img.freepik.com/free-vector/medical-video-call-consultation-illustration_52683-61503.jpg"></div>
        <div class="section-title">Popular Courses</div>
        <div id="course-list" class="grid"></div>
    </div>

    <div id="test-list-view" class="view hidden">
        <div class="back-nav" onclick="showView('home-view')"><i class="fa fa-arrow-left"></i> Test Series</div>
        <div id="test-items-container"></div>
    </div>

    <!-- The Quiz Interface -->
    <div id="quiz-view" class="view hidden quiz-mode">
        <div class="quiz-header">
            <span id="timer">00:00</span>
            <button class="submit-btn" onclick="finishQuiz()">Submit</button>
        </div>
        <div id="question-box"></div>
        <div class="quiz-footer">
            <button onclick="prevQue()">Prev</button>
            <span id="que-counter">1 / 50</span>
            <button onclick="nextQue()">Next</button>
        </div>
    </div>

    <!-- Result & Analysis -->
    <div id="result-view" class="view hidden">
        <div class="result-card">
            <h2>Your Score: <span id="final-score">0</span></h2>
            <div class="stats">
                <span class="c">Correct: <b id="stat-c">0</b></span>
                <span class="w">Wrong: <b id="stat-w">0</b></span>
            </div>
            <button onclick="showAnalysis()">Check Solutions</button>
            <button onclick="location.reload()">Back Home</button>
        </div>
        <div id="leaderboard-box"></div>
        <div id="analysis-box" class="hidden"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item" onclick="showView('home-view')"><i class="fa fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="showView('store-view')"><i class="fa fa-shopping-bag"></i><span>Store</span></div>
        <div class="nav-item"><i class="fa fa-message"></i><span>Chats</span></div>
        <div class="nav-item"><i class="fa fa-user"></i><span>Profile</span></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
